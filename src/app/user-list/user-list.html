<table>
    <thead>
        <tr>
            <th>User ID</th>
            <th>Name</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        @for(user of users$ | async; track user.id) {
        <tr>
            <td>{{ user.id }}</td>
            <td>{{ user.name }}</td>
            <td><button [routerLink]="['/user', user.id]">View</button></td><!--(click)="navigateToUser(user.id)" or [routerLink]="['/user', user.id]" causes table data rows not rendering issue-->
        </tr>
        }
    </tbody>
</table>
