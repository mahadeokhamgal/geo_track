<table>
    <thead>
        <tr>
            <th>User ID</th>
            <th>Name</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        @for(user of users; track user.userID) {
        <tr>
            <td>{{ user.userID }}</td>
            <td>{{ user.name }}</td>
            <td><button>View</button></td><!--(click)="navigateToUser(user.userID)" or [routerLink]="['/user', user.userID]" causes table data roes not rendering issue>-->
        </tr>
        }
    </tbody>
</table>
