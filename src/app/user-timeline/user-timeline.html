<div class="timeline-page">
    <div class="page-header">
      <button class="back-button" (click)="navigateToUserList()">Back to User List</button>
      <h2 class="user-title">
        {{ (user$ | async)?.name }}
        <span class="subtitle">Location Timeline</span>
      </h2>
    </div>
   <div class="timeline-layout">
   <!-- Timeline Sidebar -->
      <div class="timeline-list">
    @for(location of (timeline$ | async); track location.id) {
      <div class="timeline-item">

        <div class="time">
          🕒 {{ location.timestamp | date:'medium' }}
        </div>

        <div class="location">
          📍 {{ location.latitude }}, {{ location.longitude }}
        </div>

      </div>
    }
      </div>

<!-- Map -->
    <div class="map-container">
      <app-map
        [timeline]="(timeline$ | async) || []"
        [name]="(user$ | async)?.name">
      </app-map>
    </div>
  </div>
</div>
